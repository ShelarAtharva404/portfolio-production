apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: portfolio
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    # You can change this host to your actual production domain
    - host: portfolio.local
      http:
        paths:
          # Route API traffic to Express backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          # Route all other web traffic to Nginx/React frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
  # TLS / SSL configuration section for production
  tls:
    - hosts:
        - portfolio.local
      secretName: portfolio-tls-cert
