# Default values for portfolio.
# This is a YAML-formatted file.

namespace: portfolio

replicaCount: 2

images:
  backend:
    repository: 283236068437.dkr.ecr.us-east-1.amazonaws.com/portfolio-backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: 283236068437.dkr.ecr.us-east-1.amazonaws.com/portfolio-frontend
    tag: latest
    pullPolicy: IfNotPresent

services:
  backend:
    port: 5000
    targetPort: 5000
  frontend:
    port: 80
    targetPort: 80

resources:
  backend:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  frontend:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "150m"

ingress:
  enabled: true
  className: nginx
  host: portfolio.local
  tls:
    enabled: false
    secretName: portfolio-tls-cert

# Sensitive configuration credentials (in real production, supply dynamically via Helm --set)
secrets:
  mongodbUri: "PLACEHOLDER_BASE64_MONGODB_URI"
